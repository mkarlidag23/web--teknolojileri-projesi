<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Proje Ödevi</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Hakkında</a></li>
                    <li class="nav-item"><a class="nav-link" href="cv.html">Özgeçmiş</a></li>
                    <li class="nav-item"><a class="nav-link" href="sehrim.html">Şehrim</a></li>
                    <li class="nav-item"><a class="nav-link" href="takimimiz.html">Takımımız</a></li>
                    <li class="nav-item"><a class="nav-link" href="ilgi-alanlarim.html">İlgi Alanlarım</a></li>
                    <li class="nav-item"><a class="nav-link active" href="iletisim.html">İletişim</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5" id="app">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0 p-4 mb-5">
                    <h2 class="text-center text-primary mb-4">İletişim Formu</h2>
                    
                    <form id="iletisimFormu" action="islem.php" method="POST">
                        
                        <div class="mb-3">
                            <label class="form-label">Ad Soyad</label>
                            <input type="text" class="form-control" id="ad" name="ad" v-model="form.ad">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">E-posta</label>
                            <input type="email" class="form-control" id="email" name="email" v-model="form.email">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Konu Seçiniz</label>
                            <select class="form-select" id="konu" name="konu" v-model="form.konu">
                                <option value="">Seçiniz...</option>
                                <option value="Web Tasarım Projesi">Web Tasarım Projesi</option>
                                <option value="İş Görüşmesi">İş Görüşmesi</option>
                                <option value="Diğer">Diğer</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label d-block">Cinsiyet</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="cinsiyet" id="erkek" value="Erkek" v-model="form.cinsiyet">
                                <label class="form-check-label" for="erkek">Erkek</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="cinsiyet" id="kadin" value="Kadın" v-model="form.cinsiyet">
                                <label class="form-check-label" for="kadin">Kadın</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mesajınız</label>
                            <textarea class="form-control" id="mesaj" name="mesaj" rows="3" v-model="form.mesaj"></textarea>
                        </div>

                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input" id="onay" name="onay" v-model="form.onay">
                            <label class="form-check-label" for="onay">Bilgilerimin doğruluğunu onaylıyorum.</label>
                        </div>

                        <div id="hataMesaji" class="alert alert-danger d-none" role="alert"></div>
                        <div v-if="vueHata" class="alert alert-warning" role="alert">{{ vueHata }}</div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                            <button type="button" class="btn btn-primary" onclick="nativeKontrol()">Native JS ile Kontrol</button>
                            <button type="button" class="btn btn-success" @click="vueKontrol()">Vue.js ile Kontrol</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        function nativeKontrol() {
            let ad = document.getElementById('ad').value;
            let email = document.getElementById('email').value;
            let hataKutusu = document.getElementById('hataMesaji');
            let emailFormat = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (ad.trim() === "") {
                hataKutusu.innerHTML = "Lütfen adınızı giriniz! (Native JS)";
                hataKutusu.classList.remove('d-none');
            } else if (!emailFormat.test(email)) {
                hataKutusu.innerHTML = "Geçerli bir e-posta adresi giriniz! (Native JS)";
                hataKutusu.classList.remove('d-none');
            } else {
                hataKutusu.classList.add('d-none');
                document.getElementById('iletisimFormu').submit();
            }
        }
    </script>

    <script>
        const app = Vue.createApp({
            data() {
                return {
                    form: { ad: '', email: '', konu: '', cinsiyet: '', mesaj: '', onay: false },
                    vueHata: ''
                }
            },
            methods: {
                vueKontrol() {
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!this.form.ad) {
                        this.vueHata = 'Vue Kontrolü: İsim alanı boş bırakılamaz!';
                    } else if (!emailRegex.test(this.form.email)) {
                        this.vueHata = 'Vue Kontrolü: E-posta formatı hatalı!';
                    } else if (!this.form.onay) {
                        this.vueHata = 'Vue Kontrolü: Lütfen onay kutusunu işaretleyin!';
                    } else {
                        this.vueHata = '';
                        document.getElementById('iletisimFormu').submit();
                    }
                }
            }
        });
        app.mount('#app');
    </script>

</body>
</html>
