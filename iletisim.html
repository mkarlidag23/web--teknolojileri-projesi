<head>

    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-light">

    <main class="container mt-5" id="app">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0 p-4 mb-5">
                    <h2 class="text-center text-primary mb-2">İletişim Formu</h2>
                    <p class="text-center text-muted small mb-4">Doğrulamalar hem <strong>Native JavaScript</strong> hem <strong>Vue.js</strong> ile ayrı düğmelerde yapılır; HTML5 <code>required</code> kullanılmaz.</p>

                    <form id="iletisimFormu" action="islem.php" method="POST" novalidate>

                        <div class="mb-3">
                            <label class="form-label" for="ad">Ad Soyad</label>
                            <input type="text" class="form-control" id="ad" name="ad" autocomplete="name" v-model="form.ad">
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="email">E-posta</label>
                            <input type="text" class="form-control" id="email" name="email" autocomplete="email" v-model="form.email">
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="telefon">Telefon (yalnızca rakam)</label>
                            <input type="text" class="form-control" id="telefon" name="telefon" inputmode="numeric" autocomplete="tel" v-model="form.telefon" placeholder="Örn: 5321234567">
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="konu">Konu Seçiniz</label>
                            <select class="form-select" id="konu" name="konu" v-model="form.konu">
                                <option value="">Seçiniz...</option>
                                <option value="Web Tasarım Projesi">Web Tasarım Projesi</option>
                                <option value="İş Görüşmesi">İş Görüşmesi</option>
                                <option value="Diğer">Diğer</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <span class="form-label d-block">Cinsiyet</span>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="cinsiyet" id="erkek" value="Erkek" v-model="form.cinsiyet">
                                <label class="form-check-label" for="erkek">Erkek</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="cinsiyet" id="kadin" value="Kadın" v-model="form.cinsiyet">
                                <label class="form-check-label" for="kadin">Kadın</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="mesaj">Mesajınız</label>
                            <textarea class="form-control" id="mesaj" name="mesaj" rows="3" v-model="form.mesaj"></textarea>
                        </div>

                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input" id="onay" name="onay" value="Evet" v-model="form.onay">
                            <label class="form-check-label" for="onay">Bilgilerimin doğruluğunu onaylıyorum.</label>
                        </div>

                        <div id="hataMesaji" class="alert alert-danger d-none" role="alert"></div>
                        <div v-if="vueHata" class="alert alert-warning" role="alert">{{ vueHata }}</div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                            <button type="button" class="btn btn-primary" id="btnNative">Native JS ile Kontrol</button>
                            <button type="button" class="btn btn-success" @click="vueKontrol">Vue.js ile Kontrol</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p class="mb-0 small">&copy; 2026 Muhammet Şahin Karlıdağ</p>
    </footer>

    <script>
        const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const TELEFON_RE = /^[0-9]+$/;
        const MIN_TEL = 10;

        function nativeKontrol() {
            const ad = document.getElementById('ad').value.trim();
            const email = document.getElementById('email').value.trim();
            const telefon = document.getElementById('telefon').value.trim();
            const konu = document.getElementById('konu').value;
            const mesaj = document.getElementById('mesaj').value.trim();
            const onay = document.getElementById('onay').checked;
            const cinsiyetErkek = document.getElementById('erkek').checked;
            const cinsiyetKadin = document.getElementById('kadin').checked;

            const hataKutusu = document.getElementById('hataMesaji');
            const goster = (msg) => {
                hataKutusu.textContent = msg + ' (Native JS)';
                hataKutusu.classList.remove('d-none');
            };

            hataKutusu.classList.add('d-none');

            if (!ad) return goster('Ad soyad boş olamaz.');
            if (!EMAIL_RE.test(email)) return goster('Geçerli bir e-posta giriniz.');
            if (!TELEFON_RE.test(telefon)) return goster('Telefon yalnızca rakamlardan oluşmalıdır.');
            if (telefon.length < MIN_TEL) return goster('Telefon en az ' + MIN_TEL + ' rakam olmalıdır.');
            if (!konu) return goster('Lütfen bir konu seçiniz.');
            if (!cinsiyetErkek && !cinsiyetKadin) return goster('Cinsiyet seçiniz.');
            if (!mesaj) return goster('Mesaj alanı boş olamaz.');
            if (!onay) return goster('Onay kutusunu işaretlemelisiniz.');

            document.getElementById('iletisimFormu').submit();
        }

        document.getElementById('btnNative').addEventListener('click', nativeKontrol);
    </script>

    <script>
        const EMAIL_RE_V = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const TELEFON_RE_V = /^[0-9]+$/;
        const MIN_TEL_V = 10;

        const app = Vue.createApp({
            data() {
                return {
                    form: { ad: '', email: '', telefon: '', konu: '', cinsiyet: '', mesaj: '', onay: false },
                    vueHata: ''
                };
            },
            methods: {
                vueKontrol() {
                    const f = this.form;
                    if (!f.ad || !f.ad.trim()) {
                        this.vueHata = 'Vue: Ad soyad boş olamaz.';
                        return;
                    }
                    if (!EMAIL_RE_V.test(f.email.trim())) {
                        this.vueHata = 'Vue: E-posta formatı geçersiz.';
                        return;
                    }
                    if (!TELEFON_RE_V.test(f.telefon.trim())) {
                        this.vueHata = 'Vue: Telefon yalnızca rakam içermelidir.';
                        return;
                    }
                    if (f.telefon.trim().length < MIN_TEL_V) {
                        this.vueHata = 'Vue: Telefon en az ' + MIN_TEL_V + ' rakam olmalıdır.';
                        return;
                    }
                    if (!f.konu) {
                        this.vueHata = 'Vue: Konu seçiniz.';
                        return;
                    }
                    if (!f.cinsiyet) {
                        this.vueHata = 'Vue: Cinsiyet seçiniz.';
                        return;
                    }
                    if (!f.mesaj || !f.mesaj.trim()) {
                        this.vueHata = 'Vue: Mesaj boş olamaz.';
                        return;
                    }
                    if (!f.onay) {
                        this.vueHata = 'Vue: Onay kutusunu işaretleyin.';
                        return;
                    }
                    this.vueHata = '';
                    document.getElementById('iletisimFormu').submit();
                }
            }
        });
        app.mount('#app');
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
