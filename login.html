    <div class="login-page with-navbar">
    <div class="container px-3">
        <div class="card login-card shadow-lg border-0">
            <div class="card-body p-4 p-md-5">
                <h1 class="h4 text-center mb-4">Giriş</h1>
                <p class="small text-muted text-center mb-4">Kullanıcı adı: <strong>ogr.sakarya.edu.tr</strong> öğrenci e-postanız. Şifre: <strong>öğrenci numaranız</strong> (ör. b251210097).</p>

                <div id="loginUyari" class="alert alert-danger d-none" role="alert"></div>

                <form id="loginForm" action="login.php" method="POST" novalidate>
                    <div class="mb-3">
                        <label class="form-label" for="email">E-posta (kullanıcı adı)</label>
                        <input type="text" class="form-control" id="email" name="email" autocomplete="username" placeholder="b251210097@ogr.sakarya.edu.tr">
                    </div>
                    <div class="mb-4">
                        <label class="form-label" for="password">Şifre (öğrenci no)</label>
                        <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" placeholder="b251210097">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Giriş Yap</button>
                </form>

                <p class="text-center mt-4 mb-0">
                    <a href="index.html" class="link-secondary small">Ana sayfaya dön</a>
                </p>
            </div>
        </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const uyari = document.getElementById('loginUyari');
            const hata = params.get('hata');
            if (hata === 'bos') {
                uyari.textContent = 'E-posta ve şifre boş bırakılamaz.';
                uyari.classList.remove('d-none');
            } else if (hata === 'yanlis') {
                uyari.textContent = 'Bilgiler hatalı. Öğrenci e-postanız ve numaranızı kontrol edin.';
                uyari.classList.remove('d-none');
            }

            const SAKARYA_MAIL = /^b\d+@ogr\.sakarya\.edu\.tr$/i;

            document.getElementById('loginForm').addEventListener('submit', function (e) {
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();

                uyari.classList.add('d-none');

                if (!email || !password) {
                    e.preventDefault();
                    uyari.textContent = 'Lütfen e-posta ve şifre alanlarını doldurun.';
                    uyari.classList.remove('d-none');
                    return;
                }

                if (!SAKARYA_MAIL.test(email)) {
                    e.preventDefault();
                    uyari.textContent = 'E-posta, bXXXXXXXXX@ogr.sakarya.edu.tr biçiminde olmalıdır.';
                    uyari.classList.remove('d-none');
                    return;
                }

                const localPart = email.split('@')[0].toLowerCase();
                if (password.toLowerCase() !== localPart) {
                    e.preventDefault();
                    uyari.textContent = 'Şifre, e-postadaki öğrenci numaranız ile aynı olmalıdır.';
                    uyari.classList.remove('d-none');
                }
            });
        })();
    </script>
