<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f4f9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-container { 
            background-color: #fff; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            width: 300px; 
        }
        .login-container h2 { 
            text-align: center; 
            color: #333; 
        }
        .form-group { 
            margin-bottom: 15px; 
        }
        .form-group label { 
            display: block; 
            margin-bottom: 5px; 
            color: #666; 
        }
        .form-group input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            box-sizing: border-box; 
        }
        .submit-btn { 
            width: 100%; 
            padding: 10px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 16px; 
        }
        .submit-btn:hover { 
            background-color: #0056b3; 
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Giriş Yap</h2>
    <form action="login.php" method="POST">
        <div class="form-group">
            <label for="email">Kullanıcı Adı (E-posta):</label>
            <input type="email" id="email" name="email" required placeholder="ornek@sakarya.edu.tr">
        </div>
        <div class="form-group">
            <label for="password">Şifre (Öğrenci No):</label>
            <input type="password" id="password" name="password" required placeholder="Öğrenci Numaranız">
        </div>
        <button type="submit" class="submit-btn">Giriş</button>
    </form>
</div>

</body>
</html>
